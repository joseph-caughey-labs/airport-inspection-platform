events {
  worker_connections 1024;
}

http {
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  server_tokens off;

  # Phase 1 placeholder server. Real routing (frontend, /api/*, /ws/*) lands in T-117.
  server {
    listen 80 default_server;
    server_name _;

    location /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      add_header Content-Type text/plain;
      return 503 "Backend services not yet started.\n";
    }
  }
}
