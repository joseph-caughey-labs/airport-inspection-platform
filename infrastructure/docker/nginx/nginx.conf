events {
  worker_connections 1024;
}

http {
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 5m;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  server_tokens off;

  # ── Upstreams ────────────────────────────────────────────────────
  # Service hostnames resolve via Docker's embedded DNS on the aip-net
  # network. `resolver` lets NGINX re-resolve at runtime so a service
  # restart (different container IP) doesn't pin us to a stale address.
  resolver 127.0.0.11 ipv6=off valid=30s;

  upstream aip_web {
    server web:3000;
    keepalive 32;
  }

  upstream aip_api {
    server api-gateway:3001;
    keepalive 32;
  }

  upstream aip_ws {
    server ws-broadcaster:3005;
    keepalive 32;
  }

  # Audit-service serves the incident-timeline page's lineage reads
  # (and post-incident review reads). Same-origin from the browser
  # because the frontend uses an empty `baseUrl` on `AuditApi`.
  upstream aip_audit {
    server audit-service:3007;
    keepalive 32;
  }

  # Incident-service direct path — the dashboard's IncidentApi uses
  # the same same-origin shape (path-only, no baseUrl). Proxied here
  # so transitions reach incident-service without going through the
  # api-gateway, which doesn't have incident routes today.
  upstream aip_incidents {
    server incident-service:3006;
    keepalive 32;
  }

  # ── WebSocket upgrade map ────────────────────────────────────────
  # Set Connection: upgrade only when the client requested an upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Common proxy headers ────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_read_timeout  60s;
  proxy_send_timeout  60s;
  proxy_connect_timeout 5s;

  server {
    listen 80 default_server;
    server_name _;

    # ── Security headers (baseline; T-505 hardens CSP) ────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # ── Liveness — nginx itself answers ────────────────────────────
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # ── REST API → api-gateway ────────────────────────────────────
    location /api/ {
      proxy_pass http://aip_api;
      proxy_set_header Connection "";          # let pool keepalive flow
    }

    # ── Audit-service same-origin reads ───────────────────────────
    # Backend split: audit-service owns the hash chain + lineage
    # reads; api-gateway doesn't proxy them. The frontend's
    # `AuditApi` uses an empty baseUrl so requests come back here.
    location /audit/ {
      proxy_pass http://aip_audit;
      proxy_set_header Connection "";
    }

    # ── Incident-service direct path ──────────────────────────────
    # Same arrangement as /audit/ — IncidentApi uses empty baseUrl
    # and writes go straight to incident-service.
    location /incidents {
      proxy_pass http://aip_incidents;
      proxy_set_header Connection "";
    }

    # ── WebSocket → ws-broadcaster (upgrade required) ─────────────
    location /ws/ {
      proxy_pass http://aip_ws;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout  3600s;                # long-lived
      proxy_send_timeout  3600s;
      proxy_buffering off;
    }

    # ── Everything else → Nuxt frontend ───────────────────────────
    location / {
      proxy_pass http://aip_web;
      proxy_set_header Connection "";
    }
  }
}
