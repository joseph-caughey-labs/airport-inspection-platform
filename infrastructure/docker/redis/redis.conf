# Airport Inspection Platform — Redis configuration
# Demo-grade defaults. Production hardening (auth, TLS, ACLs) lands in Phase 5.

# --- Persistence ---
# AOF for better durability; the demo replays from this on restart.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB snapshots as a safety net.
save 900 1
save 300 10
save 60 10000

# --- Memory ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Network ---
bind 0.0.0.0
protected-mode no

# --- Logging ---
loglevel notice

# --- Misc ---
tcp-keepalive 60
timeout 0
