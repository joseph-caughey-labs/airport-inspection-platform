name: Security Scan

# T-508 — Trivy vulnerability + misconfiguration scanning.
#
# Two gates, both fail on actionable HIGH/CRITICAL findings:
#   - dependency-scan: filesystem scan of lockfiles (pnpm + Python) and
#     Dockerfile misconfigs. No Docker build — deterministic + fast.
#   - image-scan: builds every service image (reusing the e2e-integration
#     GHA layer cache so it's warm) and scans each built image's OS +
#     installed packages.
#
# `--ignore-unfixed` keeps the gate ACTIONABLE: it fails only on
# vulnerabilities that have a fix available (a base-image bump or a
# dependency upgrade), not on un-patchable upstream CVEs that would
# otherwise wedge every PR with no recourse.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_VERSION: v0.55.0
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  dependency-scan:
    name: Trivy — dependencies + Dockerfiles (T-508)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          trivy --version

      # GATE: known-vulnerable dependencies with an available fix.
      # Scans pnpm-lock.yaml + the Python requirements across the repo.
      - name: Scan dependencies (lockfiles)
        run: |
          trivy fs \
            --scanners vuln \
            --severity "${TRIVY_SEVERITY}" \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            .

      # INFORMATIONAL: Dockerfile / compose misconfigurations. Surfaced
      # in the log but does NOT gate (exit-code 0) — misconfig findings
      # are advisory hardening, not merge blockers.
      - name: Scan Dockerfiles (misconfig, advisory)
        run: |
          trivy config \
            --severity "${TRIVY_SEVERITY}" \
            --exit-code 0 \
            --no-progress \
            .

  image-scan:
    name: Trivy — container images (T-508)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # GHA cache backend (`type=gha`) needs write to warm the cache.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      # Reuse the same `scope=integration` layer cache the e2e
      # integration workflow warms, so this rarely pays a cold build.
      - name: Build images (with GHA cache)
        uses: docker/bake-action@v5
        with:
          files: docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=integration

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          trivy --version

      # GATE: scan every image the compose stack runs (built services +
      # the postgres/redis base images). `compose config --images` lists
      # exactly the tags bake just loaded, so names always match.
      - name: Scan all stack images
        run: |
          set -uo pipefail
          images=$(docker compose config --images | sort -u)
          echo "Images to scan:"; echo "$images"
          failed=0
          for img in $images; do
            echo "::group::trivy image $img"
            if ! trivy image \
              --severity "${TRIVY_SEVERITY}" \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress \
              "$img"; then
              echo "::error::HIGH/CRITICAL fixable vulnerabilities in $img"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
